<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden of Moksha</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --crimson: #8b0000;
  --indigo: #0b0f2f;
  --black: #000;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at center, #0b0f2f 0%, #000 100%);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  overflow: hidden;
}

/* ENTRY SCREEN */

#entry {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000 40%, #0b0f2f 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity 2s ease;
  z-index: 999;
}

#lotus {
  width: 200px;
  height: 200px;
  cursor: pointer;
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

#enter-text {
  margin-top: 20px;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 20px;
  letter-spacing: 3px;
}

/* MAIN */

#main {
  display: none;
  height: 100vh;
  width: 100%;
  padding: 40px;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* TITLE */

.title {
  text-align: center;
  margin-bottom: 30px;
}

.title h1 {
  font-size: 48px;
  letter-spacing: 4px;
}

.title .sanskrit {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 22px;
  margin-top: 10px;
}

/* GRID */

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  height: 70%;
}

.card {
  border: 1px solid rgba(212,175,55,0.3);
  padding: 20px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px);
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,175,55,0.4);
}

.card h2 {
  margin-bottom: 10px;
}

.card::before {
  content: "ॐ नमः शिवाय";
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 10px;
  opacity: 0.2;
  font-family: 'Noto Serif Devanagari';
}

/* DECORATIVE ELEMENTS */

.trident {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.1;
}

.nataraja {
  position: absolute;
  right: 10px;
  bottom: 10px;
  opacity: 0.08;
}

/* FOOTER */

.footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.4;
}

</style>
</head>

<body>

<!-- ENTRY -->

<div id="entry">
  <svg id="lotus" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="40" fill="#d4af37"/>
    <g fill="#8b0000">
      <path d="M100 20 Q130 60 100 100 Q70 60 100 20"/>
      <path d="M180 100 Q140 130 100 100 Q140 70 180 100"/>
      <path d="M100 180 Q70 140 100 100 Q130 140 100 180"/>
      <path d="M20 100 Q60 70 100 100 Q60 130 20 100"/>
    </g>
  </svg>

  <div id="enter-text">Enter the Garden</div>
</div>

<!-- MAIN -->

<div id="main">

  <div class="title">
    <h1>Garden of Moksha</h1>
    <div class="sanskrit">मोक्ष उद्यान</div>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Poetry</h2>
      <p>Sutras of transcendence and longing.</p>
    </div>

    <div class="card">
      <h2>Prose</h2>
      <p>The Lotus Pages. Mystical narrative architecture.</p>
    </div>

    <div class="card">
      <h2>Music</h2>
      <p>From desire to dissolution.</p>
    </div>

    <div class="card">
      <h2>LIVE</h2>
      <p>Ritual performance & spoken word.</p>
    </div>

    <div class="card">
      <h2>Merch</h2>
      <p>Artifacts from the Garden.</p>
    </div>

  </div>

  <div class="footer">
    OM NAMAH SHIVAYA
  </div>

</div>

<!-- AUDIO -->

<audio id="bg-audio" loop>
  <source src="ambient.mp3" type="audio/mpeg">
</audio>

<script>

const lotus = document.getElementById('lotus');
const entry = document.getElementById('entry');
const main = document.getElementById('main');
const audio = document.getElementById('bg-audio');

lotus.addEventListener('click', () => {
  entry.style.opacity = 0;

  setTimeout(() => {
    entry.style.display = 'none';
    main.style.display = 'block';
    document.body.style.overflow = 'auto';
    audio.play();
  }, 2000);
});

</script>

</body>
</html>
