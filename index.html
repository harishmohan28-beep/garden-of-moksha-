<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden of Moksha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&family=Noto+Serif+Devanagari:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* \u2500\u2500\u2500 ROOT VARIABLES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    :root {
      --black:       #050305;
      --deep:        #0a0508;
      --blood:       #5c0a0a;
      --crimson:     #8b1a1a;
      --rose:        #c0392b;
      --gold:        #c9a84c;
      --gold-light:  #e8c97a;
      --ivory:       #f0e6d0;
      --ash:         #9a8f8f;
      --smoke:       #2a1f2a;
      --lotus:       #d4a0c0;
      --lotus-deep:  #8b3a6b;
    }

    /* \u2500\u2500\u2500 RESET & BASE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--ivory);
      font-family: 'IM Fell English', serif;
      overflow-x: hidden;
      cursor: crosshair;
    }
    ::selection { background: var(--blood); color: var(--gold); }

    /* \u2500\u2500\u2500 SCROLLBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--blood); border-radius: 0; }

    /* \u2500\u2500\u2500 GRAIN OVERLAY \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      mix-blend-mode: overlay;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       GATE \u2014 OPENING PORTAL
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #gate {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: radial-gradient(ellipse at center, #12041a 0%, #050305 70%);
      transition: opacity 1.8s ease, visibility 1.8s ease;
    }
    #gate.dissolved { opacity: 0; visibility: hidden; pointer-events: none; }

    .gate-bg-mandalas {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .gate-mandala-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.08);
      animation: slowSpin 40s linear infinite;
    }
    .gate-mandala-ring:nth-child(1)  { width: 700px; height: 700px; animation-duration: 60s; }
    .gate-mandala-ring:nth-child(2)  { width: 520px; height: 520px; animation-direction: reverse; animation-duration: 45s; border-color: rgba(139,26,26,0.1); }
    .gate-mandala-ring:nth-child(3)  { width: 360px; height: 360px; animation-duration: 30s; border-color: rgba(201,168,76,0.15); }
    .gate-mandala-ring:nth-child(4)  { width: 200px; height: 200px; animation-direction: reverse; animation-duration: 20s; border-color: rgba(212,160,192,0.12); }

    @keyframes slowSpin { to { transform: rotate(360deg); } }

    /* Decorative petals around ring */
    .gate-mandala-ring::before, .gate-mandala-ring::after {
      content: '\u2726';
      position: absolute; top: 50%; left: -6px;
      transform: translateY(-50%);
      color: var(--gold); font-size: 10px; opacity: 0.5;
    }
    .gate-mandala-ring::after { left: auto; right: -6px; }

    /* LOTUS BUTTON */
    #lotus-gate {
      position: relative;
      width: 180px; height: 180px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      animation: lotusFloat 4s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes lotusFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .lotus-svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 30px rgba(212,160,192,0.5)) drop-shadow(0 0 60px rgba(139,26,26,0.3));
      transition: filter 0.4s ease, transform 0.4s ease;
    }
    #lotus-gate:hover .lotus-svg {
      filter: drop-shadow(0 0 50px rgba(212,160,192,0.9)) drop-shadow(0 0 100px rgba(201,168,76,0.5));
      transform: scale(1.08);
    }

    .gate-inscription {
      margin-top: 40px;
      text-align: center;
      z-index: 2;
    }
    .gate-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
      line-height: 1.2;
    }
    .gate-sanskrit {
      font-family: 'Noto Serif Devanagari', serif;
      font-size: 1rem;
      color: var(--ash);
      letter-spacing: 0.15em;
      margin-top: 8px;
      opacity: 0.7;
    }
    .gate-cta {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--lotus);
      margin-top: 24px;
      opacity: 0;
      animation: fadePulse 2.5s ease-in-out 1s infinite;
      text-transform: uppercase;
    }
    @keyframes fadePulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* Spark particles on hover */
    #lotus-gate:hover::before {
      content: '\u2726 \u0950 \u2726';
      position: absolute;
      top: -30px;
      font-size: 0.8rem;
      color: var(--gold);
      animation: sparkRise 0.8s ease forwards;
      pointer-events: none;
    }
    @keyframes sparkRise {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-30px); }
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       MAIN SITE (hidden until gate dissolves)
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #main-site {
      opacity: 0;
      transition: opacity 1.5s ease 0.5s;
      pointer-events: none;
    }
    #main-site.revealed { opacity: 1; pointer-events: all; }

    /* \u2500\u2500\u2500 AMBIENT OHM AUDIO INDICATOR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    #audio-toggle {
      position: fixed; top: 24px; right: 24px; z-index: 500;
      background: rgba(5,3,5,0.7);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      font-size: 1.2rem;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s, background 0.3s;
    }
    #audio-toggle:hover { border-color: var(--gold); background: rgba(92,10,10,0.5); }
    #audio-toggle.playing { color: var(--lotus); border-color: var(--lotus-deep); }

    /* \u2500\u2500\u2500 NAVIGATION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;
      padding: 18px 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(5,3,5,0.95) 0%, transparent 100%);
      backdrop-filter: blur(4px);
    }
    .nav-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-decoration: none;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }
    .nav-logo span {
      display: block;
      font-family: 'Noto Serif Devanagari', serif;
      font-size: 0.65rem;
      color: var(--ash);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    .nav-links {
      display: flex; gap: 36px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--ash);
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute; left: 0; bottom: -4px;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links .nav-sanskrit {
      display: block;
      font-family: 'Noto Serif Devanagari', serif;
      font-size: 0.55rem;
      color: var(--lotus-deep);
      text-transform: none;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       HERO SECTION
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    #hero {
      min-height: 100vh;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 50% 40%, rgba(92,10,10,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(139,58,107,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 30% 50% at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 60%),
        linear-gradient(to bottom, #050305 0%, #0a0508 50%, #050305 100%);
    }

    /* Large background OM */
    .hero-om-bg {
      position: absolute;
      font-size: clamp(300px, 50vw, 700px);
      color: rgba(201,168,76,0.03);
      font-family: 'Noto Serif Devanagari', serif;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      line-height: 1;
      animation: omBreath 8s ease-in-out infinite;
      user-select: none;
    }
    @keyframes omBreath {
      0%, 100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 0.06; transform: translate(-50%, -50%) scale(1.02); }
    }

    /* Floating decorative elements */
    .hero-deco {
      position: absolute;
      pointer-events: none;
      opacity: 0.12;
      animation: slowFloat 6s ease-in-out infinite;
    }
    .hero-deco-skull {
      font-size: 80px;
      top: 15%; left: 8%;
      animation-delay: 0s;
    }
    .hero-deco-trident {
      font-size: 90px;
      top: 20%; right: 10%;
      animation-delay: 2s;
    }
    .hero-deco-rose-l {
      font-size: 60px;
      bottom: 25%; left: 5%;
      animation-delay: 1s;
    }
    .hero-deco-rose-r {
      font-size: 60px;
      bottom: 30%; right: 6%;
      animation-delay: 3s;
    }
    .hero-deco-nataraja {
      font-size: 100px;
      bottom: 10%; left: 50%;
      transform: translateX(-50%);
      animation-delay: 1.5s;
      opacity: 0.06;
    }
    @keyframes slowFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-12px) rotate(2deg); }
    }

    /* Vine/thorn border lines */
    .hero-vines {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .vine-line {
      position: absolute;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.15), transparent);
      height: 1px;
    }
    .vine-line-top    { top: 80px; left: 0; right: 0; }
    .vine-line-bottom { bottom: 80px; left: 0; right: 0; }

    .hero-content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 0 20px;
    }
    .hero-eyebrow {
      font-family: 'Noto Serif Devanagari', serif;
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: var(--lotus);
      letter-spacing: 0.3em;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 900;
      line-height: 1.05;
      color: var(--gold);
      text-shadow:
        0 0 80px rgba(201,168,76,0.3),
        0 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 12px;
    }
    .hero-title span {
      color: var(--ivory);
      display: block;
      font-size: 0.55em;
      letter-spacing: 0.5em;
      font-weight: 400;
      margin-top: 8px;
    }
    .hero-subtitle {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 1.5vw, 1.15rem);
      color: var(--ash);
      max-width: 540px;
      margin: 24px auto 0;
      line-height: 1.7;
    }
    .hero-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 32px auto;
    }
    .hero-om-text {
      font-family: 'Noto Serif Devanagari', serif;
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.6;
      letter-spacing: 0.5em;
      animation: omBreath2 4s ease-in-out infinite;
    }
    @keyframes omBreath2 {
      0%, 100% { opacity: 0.4; text-shadow: 0 0 10px rgba(201,168,76,0.2); }
      50%       { opacity: 0.8; text-shadow: 0 0 30px rgba(201,168,76,0.6); }
    }

    /* Scroll indicator */
    .scroll-down {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--ash);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: scrollPulse 2s ease-in-out infinite;
    }
    .scroll-down::after {
      content: '';
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
      50%       { opacity: 1;   transform: translateX(-50%) translateY(4px); }
    }

    /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       SECTION BASE STYLES
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
    .section {
      min-height: 100vh;
      position: relative;
      padding: 120px 60px;
      overflow: hidden;
    }

    .section-header {
      text-align: center;
      margin-bottom: 80px;
      position: relative;
    }
    .section-number {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: var(--blood);
      text-transform: uppercase;
      display: block;
      margin-bottom: 12px;
    }
    .section-title-en {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.15em;
      display: block;
      line-height: 1;
    }
    .section-title-sa {
      font-family: 'Noto Serif Devanagari', serif;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      color: var(--lotus);
      display: block;
      margin-top: 12px;
      opacity: 0.7;
      letter-spacing: 0.1em;
    }
    .section-rule {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--crimson), transparent);
      margin: 24px auto 0;
    }
    .section-desc {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--ash);
      font-size: 0.95rem;
      margin-top: 16px;
      letter-spacing: 0.05em;
    }
