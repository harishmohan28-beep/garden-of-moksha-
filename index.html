<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden of Moksha</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+Devanagari&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<style>

/* ================= GLOBAL ================= */

body {
  margin:0;
  overflow:hidden;
  background:#02020a;
  color:#d4af37;
  font-family:'Cinzel', serif;
}

/* ================= ENTRY ================= */

#entry {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:10;
}

#lotus {
  font-size:70px;
  cursor:pointer;
  animation:pulse 3s infinite;
}

@keyframes pulse {
  0%,100%{opacity:0.6;}
  50%{opacity:1;}
}

/* ================= OVERLAY TEXT ================= */

#overlay {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  pointer-events:none;
}

#overlay h1 {
  font-size:40px;
}

.sanskrit {
  font-family:'Noto Serif Devanagari';
  opacity:0.7;
}

/* ================= LABELS ================= */

.label {
  position:absolute;
  color:#d4af37;
  font-family:'Noto Serif Devanagari';
  font-size:14px;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
  <div id="lotus">ॐ</div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <h1>Garden of Moksha</h1>
  <div class="sanskrit">मोक्ष उद्यान</div>
</div>

<canvas id="scene"></canvas>

<audio id="om" loop src="om.mp3"></audio>
<audio id="bell" src="bell.mp3"></audio>

<script>

/* ================= THREE SETUP ================= */

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,8);

let renderer = new THREE.WebGLRenderer({canvas:document.getElementById("scene"), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);

/* CONTROLS */
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;

/* LIGHTING */
let light = new THREE.PointLight(0xffcc88,2,50);
light.position.set(0,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x222222));

/* FLOOR */
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x050505})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* HALO */
let halo = new THREE.Mesh(
  new THREE.TorusGeometry(2,0.05,16,100),
  new THREE.MeshBasicMaterial({color:0xd4af37})
);
halo.position.y = 3;
scene.add(halo);

/* PORTALS */

let portals = [];

function createPortal(x, label, sanskrit){

  let geo = new THREE.BoxGeometry(1,3,0.2);
  let mat = new THREE.MeshStandardMaterial({
    color:0x111111,
    emissive:0x442200
  });

  let mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,1.5,0);

  scene.add(mesh);
  portals.push(mesh);

  /* LABEL */
  let div = document.createElement("div");
  div.className = "label";
  div.innerHTML = label + "<br>" + sanskrit;
  document.body.appendChild(div);

  mesh.userData.label = div;
}

/* CREATE ALL PORTALS */

createPortal(-4,"SUTRAS","सूत्र");
createPortal(-2,"RAGAS","राग");
createPortal(0,"MANTRAS","मन्त्र");
createPortal(2,"IN THE FLESH","साक्षात्");
createPortal(4,"INITIATION","दीक्षा");

/* PARTICLES */

let particles = new THREE.BufferGeometry();
let count = 800;
let positions = new Float32Array(count*3);

for(let i=0;i<count;i++){
  positions[i*3]=(Math.random()-0.5)*20;
  positions[i*3+1]=Math.random()*10;
  positions[i*3+2]=(Math.random()-0.5)*20;
}

particles.setAttribute('position', new THREE.BufferAttribute(positions,3));

let pMat = new THREE.PointsMaterial({size:0.05});
let particleSystem = new THREE.Points(particles,pMat);
scene.add(particleSystem);

/* ================= ANIMATE ================= */

function animate(){
  requestAnimationFrame(animate);

  halo.rotation.y += 0.005;

  /* UPDATE LABEL POSITIONS */
  portals.forEach(p=>{
    let vector = p.position.clone().project(camera);

    let x = (vector.x * 0.5 + 0.5) * window.innerWidth;
    let y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

    p.userData.label.style.left = x + "px";
    p.userData.label.style.top = y + "px";
  });

  renderer.render(scene,camera);
}

animate();

/* ================= ENTRY ================= */

document.getElementById("lotus").onclick = () => {

  document.getElementById("entry").style.display="none";

  /* AUDIO */
  let bell = document.getElementById("bell");
  let om = document.getElementById("om");

  bell.play();

  om.volume = 0;
  om.play();

  let fade = setInterval(()=>{
    if(om.volume < 0.5) om.volume += 0.01;
    else clearInterval(fade);
  },100);
};

/* RESIZE */

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
