<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden of Moksha</title>

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(circle at center, #0a0a0a, #000);
  color: #f5f5f5;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

/* GLOW LAYER */
.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.03), transparent);
  pointer-events: none;
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.title {
  font-size: 3rem;
  letter-spacing:4px;
}

.subtitle {
  opacity:0.5;
  margin-bottom:30px;
}

/* LOTUS SVG */
.lotus-container {
  position: relative;
  width: 160px;
  height:160px;
  cursor:pointer;
}

.mandala {
  position:absolute;
  width:220px;
  height:220px;
  top:-30px;
  left:-30px;
  border-radius:50%;
  border:1px dashed rgba(255,255,255,0.08);
  animation: spin 30s linear infinite;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

.lotus-svg {
  width:100%;
  height:100%;
  fill:none;
  stroke:white;
  stroke-width:1;
  opacity:0.8;
}

.lotus-container:hover {
  transform:scale(1.1);
  transition:0.6s;
}

/* SECTIONS */
section {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  opacity:0;
  transform:translateY(60px);
  transition:1.5s ease;
}

section.visible {
  opacity:1;
  transform:translateY(0);
}

h2 {
  letter-spacing:2px;
  font-weight:400;
}

p {
  max-width:500px;
  opacity:0.7;
}

/* NAV */
.nav {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  font-size:12px;
  opacity:0.5;
}

.nav div {
  cursor:pointer;
}

/* SYMBOL FIELD */
.symbol {
  position:fixed;
  opacity:0.06;
  font-size:22px;
}

.trident { top:20px; right:20px; }
.eye { top:50%; left:10px; }
.rose { bottom:30%; right:10px; }
.jasmine { top:30%; right:40px;
